<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 主持人控制台 — AML 排位賽</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); }

    .admin-header {
      background: var(--primary);
      border-bottom: 2px solid #b45309;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header h1 { font-size: 1rem; font-weight: 700; color: #ffffff; }
    .admin-header p  { font-size: 0.8rem; color: rgba(255,255,255,0.8); }

    .qr-url-row { display: flex; align-items: center; gap: 16px; }
    #qr-img { border-radius: 8px; background: white; padding: 4px; }
    .url-box {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.85rem; word-break: break-all; color: var(--text);
    }

    /* 進度表格 */
    .progress-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .progress-table th, .progress-table td {
      padding: 9px 12px; border-bottom: 1px solid var(--border); text-align: left;
    }
    .progress-table th { color: var(--muted); font-weight: 600; font-size: 0.75rem; }
    .progress-table td:last-child { font-weight: 700; }
    .progress-table tr:last-child td { border-bottom: none; }

    .done-badge { color: var(--success); font-weight: 700; }
    .prog-bar-cell { width: 120px; }
    .mini-bar-bg { height: 5px; background: var(--card2); border-radius: 3px; margin-top: 4px; }
    .mini-bar    { height: 5px; background: var(--primary); border-radius: 3px; transition: width 0.4s; }

    .btn-large { padding: 16px; font-size: 1rem; border-radius: 14px; }

    /* 匯出表格 */
    .export-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .export-table th, .export-table td {
      padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left;
    }
    .export-table th { color: var(--muted); font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body>

<!-- 頂部導覽 -->
<div class="admin-header">
  <div>
    <h1>🎮 主持人控制台</h1>
    <p id="phase-text">等待大廳</p>
  </div>
    <div style="display:flex;align-items:center;gap:8px;">
    <span class="status-dot" style="background:rgba(255,255,255,0.9);"></span>
    <span style="font-size:0.8rem;color:rgba(255,255,255,0.85);">已連線</span>
  </div>
</div>

<div class="admin-layout">

  <!-- ── 左側邊欄 ─────────────────────────── -->
  <div class="admin-sidebar">

    <!-- QR + URL -->
    <div class="card card-sm">
      <div class="section-title">📱 員工加入方式</div>
      <div class="qr-url-row" style="margin-top:10px;">
        <img id="qr-img" src="" alt="QR Code" width="90" height="90">
        <div>
          <p style="font-size:0.75rem;color:var(--muted);margin-bottom:6px;">員工用手機掃碼或開啟：</p>
          <div id="join-url" class="url-box">載入中…</div>
        </div>
      </div>
    </div>

    <!-- 整體進度摘要 -->
    <div class="card card-sm" style="margin-top:12px;">
      <div class="section-title">📊 整體進度</div>
      <div style="display:flex;gap:16px;margin-top:10px;text-align:center;">
        <div style="flex:1;">
          <div id="stat-players" class="big-num">0</div>
          <div class="text-muted" style="font-size:0.75rem;">人加入</div>
        </div>
        <div style="flex:1;">
          <div id="stat-finished" class="big-num">0</div>
          <div class="text-muted" style="font-size:0.75rem;">人完成</div>
        </div>
        <div style="flex:1;">
          <div id="stat-avg" class="big-num">-</div>
          <div class="text-muted" style="font-size:0.75rem;">平均題數</div>
        </div>
      </div>
    </div>

    <!-- 操作按鈕 -->
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">
      <button id="start-btn"    class="btn btn-primary btn-large" onclick="startGame()">🚀 開始遊戲</button>
      <button id="forceend-btn" class="btn btn-danger  btn-large hidden" onclick="forceEnd()">🏁 強制結束遊戲</button>
      <button id="reset-btn"    class="btn btn-ghost"              onclick="confirmReset()">🔄 重置遊戲</button>
    </div>
  </div>

  <!-- ── 右側主區域 ───────────────────────── -->
  <div>

    <!-- 等待大廳 -->
    <div id="area-lobby">
      <div class="card text-center" style="padding:36px;">
        <div style="font-size:2.5rem;">⏳</div>
        <p style="font-size:1.05rem;font-weight:700;margin-top:12px;">等待玩家加入</p>
        <p class="text-muted mt-8" style="font-size:0.9rem;">確認玩家加入後，按左側「開始遊戲」</p>
        <p class="text-muted mt-8" style="font-size:0.85rem;">
          遊戲說明：開始後每位玩家可<strong>自行作答並立即查看解析</strong>，答完自行按「下一題」繼續。
        </p>
      </div>
    </div>

    <!-- 遊戲進行中：逐人進度表 -->
    <div id="area-playing" class="hidden">
      <div class="card">
        <div class="section-title" style="margin-bottom:12px;">👥 各玩家進度（即時更新）</div>
        <table class="progress-table">
          <thead>
            <tr>
              <th>名次</th>
              <th>姓名</th>
              <th>分數</th>
              <th>進度</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="progress-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 遊戲結束 -->
    <div id="area-ended" class="hidden">
      <div class="card text-center" style="padding:28px;margin-bottom:12px;">
        <div style="font-size:2.5rem;">🏆</div>
        <p style="font-size:1.2rem;font-weight:700;color:var(--primary);margin-top:10px;">遊戲結束！</p>
      </div>

      <div class="card" style="margin-bottom:12px;">
        <div class="section-title">🎖️ 最終排名</div>
        <ul id="final-leaderboard" class="leaderboard" style="margin-top:8px;"></ul>
      </div>

      <div class="card card-sm">
        <div class="section-title">📄 匯出完訓成績</div>
        <table class="export-table" style="margin-top:8px;">
          <thead><tr><th>名次</th><th>姓名</th><th>得分</th></tr></thead>
          <tbody id="export-tbody"></tbody>
        </table>
        <button class="btn btn-primary" style="margin-top:14px;" onclick="exportCSV()">
          ⬇ 下載 CSV（完訓紀錄）
        </button>
      </div>
    </div>

  </div>
</div>

<!-- ════════════════════════════════════════════
     JavaScript
════════════════════════════════════════════ -->
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let exportData = [];

// ── QR Code ──────────────────────────────────
(function() {
  const url = `${location.protocol}//${location.hostname}${location.port ? ':' + location.port : ''}`;
  document.getElementById('join-url').textContent = url;
  document.getElementById('qr-img').src =
    `https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=${encodeURIComponent(url)}&bgcolor=ffffff&color=0d1b2a`;
})();

// ── 區域切換 ─────────────────────────────────
function showArea(name) {
  ['lobby','playing','ended'].forEach(a =>
    document.getElementById(`area-${a}`).classList.toggle('hidden', a !== name)
  );
}

// ── 玩家進度更新 ──────────────────────────────
function updateProgress(players) {
  exportData = players;

  // 摘要統計
  const finished = players.filter(p => p.finished).length;
  const avgQ = players.length
    ? (players.reduce((s, p) => s + p.current, 0) / players.length).toFixed(1)
    : '-';
  document.getElementById('stat-players').textContent  = players.length;
  document.getElementById('stat-finished').textContent = finished;
  document.getElementById('stat-avg').textContent      = avgQ;

  // 進度表
  const tbody = document.getElementById('progress-tbody');
  tbody.innerHTML = players.map(p => {
    const pct = Math.round(((p.current) / p.total) * 100);
    const statusHtml = p.finished
      ? '<span class="done-badge">✅ 完成</span>'
      : `<span class="text-muted">第 ${p.current}/${p.total} 題</span>`;
    return `<tr>
      <td>${p.rank}</td>
      <td>${esc(p.name)}</td>
      <td class="text-primary">${p.score.toLocaleString()}</td>
      <td class="prog-bar-cell">
        <div>${p.current}/${p.total}</div>
        <div class="mini-bar-bg"><div class="mini-bar" style="width:${pct}%"></div></div>
      </td>
      <td>${statusHtml}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="text-muted" style="padding:16px 12px;">尚無玩家</td></tr>';
}

// ── 排行榜渲染 ───────────────────────────────
function renderLeaderboard(elId, data) {
  const medals = ['🥇','🥈','🥉'];
  document.getElementById(elId).innerHTML = data.map((p, i) => `
    <li>
      <span class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i]||(i+1)}</span>
      <span class="rank-name">${esc(p.name)}</span>
      <span class="rank-score">${p.score.toLocaleString()}</span>
    </li>
  `).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 操作函式 ─────────────────────────────────
function startGame() {
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').textContent = '遊戲進行中…';
  socket.emit('admin:start');
}

function forceEnd() {
  if (confirm('確定要強制結束遊戲嗎？所有玩家會立即看到最終排名。')) {
    socket.emit('admin:force-end');
  }
}

function confirmReset() {
  if (confirm('確定要重置遊戲嗎？所有分數與進度將清除。')) {
    socket.emit('admin:reset');
  }
}

function exportCSV() {
  const rows = [['名次','姓名','得分']];
  exportData.forEach(p => rows.push([p.rank, p.name, p.score]));
  const bom = '\uFEFF';
  const blob = new Blob([bom + rows.map(r => r.join(',')).join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `AML_排位賽成績_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Socket 事件 ───────────────────────────────

socket.on('admin:sync', ({ phase, totalQ, players }) => {
  document.getElementById('phase-text').textContent =
    { lobby: '⏳ 等待大廳', playing: '🟡 遊戲進行中', ended: '🏁 遊戲結束' }[phase] || phase;
  updateProgress(players);
  showArea(phase === 'ended' ? 'ended' : phase === 'playing' ? 'playing' : 'lobby');
  if (phase !== 'lobby') {
    document.getElementById('start-btn').disabled = true;
    document.getElementById('start-btn').textContent = '遊戲進行中…';
    document.getElementById('forceend-btn').classList.toggle('hidden', phase === 'ended');
  }
});

socket.on('lobby:update', (players) => updateProgress(players));

socket.on('admin:game-started', () => {
  document.getElementById('phase-text').textContent = '🟡 遊戲進行中';
  document.getElementById('forceend-btn').classList.remove('hidden');
  showArea('playing');
});

socket.on('admin:progress-update', (players) => updateProgress(players));

socket.on('game:ended', (players) => {
  document.getElementById('phase-text').textContent = '🏁 遊戲結束';
  document.getElementById('forceend-btn').classList.add('hidden');
  exportData = players;

  renderLeaderboard('final-leaderboard', players);

  const tbody = document.getElementById('export-tbody');
  tbody.innerHTML = players.map(p =>
    `<tr><td>${p.rank}</td><td>${esc(p.name)}</td><td>${p.score.toLocaleString()}</td></tr>`
  ).join('');

  showArea('ended');
});

socket.on('game:reset', () => {
  document.getElementById('phase-text').textContent = '⏳ 等待大廳';
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').textContent = '🚀 開始遊戲';
  document.getElementById('forceend-btn').classList.add('hidden');
  updateProgress([]);
  showArea('lobby');
});

socket.emit('admin:join');
</script>
</body>
</html>
