<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AML 排位賽</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     畫面 1：輸入姓名
════════════════════════════════════════════ -->
<div id="screen-join" class="page-center">
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <h1>AML 洗錢防制排位賽</h1>
      <p>2026 年度教育訓練</p>
    </div>
    <div class="card">
      <div class="section-title">輸入你的姓名加入遊戲</div>
      <input id="name-input" class="input" type="text" placeholder="例如：王小明" maxlength="20" autocomplete="off">
      <p id="join-error" class="text-danger mt-4 hidden" style="font-size:0.85rem;margin-bottom:10px;"></p>
      <button id="join-btn" class="btn btn-primary">加入遊戲 →</button>
    </div>
    <p class="text-center text-muted mt-12" style="font-size:0.8rem;">
      若無法加入，請確認網路連線正常後重新整理頁面
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     畫面 2：等候大廳
════════════════════════════════════════════ -->
<div id="screen-lobby" class="page-center hidden">
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <h1>AML 洗錢防制排位賽</h1>
      <p id="lobby-name-display" class="text-primary mt-4" style="font-size:1rem;font-weight:700;"></p>
    </div>
    <div class="card text-center">
      <div class="pulse-icon">⏳</div>
      <p class="waiting-text mt-12">正在等待主持人開始遊戲…</p>
      <p class="text-muted mt-8" style="font-size:0.8rem;">共 <span id="lobby-count">0</span> 人已加入</p>
    </div>
    <div class="card card-sm mt-8">
      <div class="section-title">目前在場玩家</div>
      <ul id="lobby-list" class="leaderboard"></ul>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     畫面 3：作答中
════════════════════════════════════════════ -->
<div id="screen-question" class="page-center hidden">
  <div class="container">
    <!-- 倒數計時 -->
    <div class="timer-wrap">
      <div class="timer-bar-bg">
        <div id="timer-bar" class="timer-bar" style="width:100%"></div>
      </div>
      <span id="timer-num" class="timer-num">60</span>
    </div>

    <!-- 題目 -->
    <div class="card">
      <span id="q-category" class="category-badge"></span>
      <p id="q-meta" class="question-meta"></p>
      <p id="q-text" class="question-text"></p>

      <div id="options-grid" class="options-grid">
        <button class="option-btn" data-key="A" onclick="submitAnswer('A')"></button>
        <button class="option-btn" data-key="B" onclick="submitAnswer('B')"></button>
        <button class="option-btn" data-key="C" onclick="submitAnswer('C')"></button>
        <button class="option-btn" data-key="D" onclick="submitAnswer('D')"></button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     畫面 4：揭曉答案 + 解析（員工自行查看）
════════════════════════════════════════════ -->
<div id="screen-reveal" class="page-center hidden">
  <div class="container">
    <!-- 結果 -->
    <div id="reveal-banner" class="result-banner correct-bg">
      <div id="reveal-icon" class="result-icon">🎉</div>
      <p id="reveal-title" class="result-title mt-8"></p>
      <p id="reveal-points" class="result-points mt-4"></p>
      <p id="reveal-total" class="text-muted mt-4" style="font-size:0.85rem;"></p>
    </div>

    <!-- 正確答案 -->
    <div class="card" style="margin-top:12px;">
      <div class="section-title">✅ 正確答案</div>
      <p id="reveal-correct-letter" style="font-size:1.8rem;font-weight:800;color:var(--success);margin:8px 0 12px;"></p>

      <!-- 解析 -->
      <div class="explanation">
        <div class="explanation-label">📖 解析說明</div>
        <p id="reveal-explanation"></p>
      </div>
    </div>

    <!-- 下一題 / 結束按鈕 -->
    <div style="margin-top:16px;">
      <button id="reveal-next-btn" class="btn btn-primary" onclick="goNext()">▶ 下一題</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     畫面 5：遊戲結束最終排行榜
════════════════════════════════════════════ -->
<div id="screen-final" class="page-center hidden">
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🏆</div>
      <h1 style="color:var(--primary);">遊戲結束！</h1>
      <p>感謝參加 2026 年度 AML 教育訓練</p>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="section-title" style="margin-bottom:0;">🎖️ 最終排名</div>
        <span id="final-status" class="badge badge-gold">⏳ 等待其他人完成…</span>
      </div>
      <ul id="final-leaderboard" class="leaderboard"></ul>
    </div>
    <p class="text-center text-muted mt-16" style="font-size:0.85rem;line-height:1.7;">
      完訓紀錄由主持人統一匯出。<br>謝謝大家的參與！
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     JavaScript
════════════════════════════════════════════ -->
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myName      = '';
let currentTimer = null;
let myAnswered  = false;

// ─── 畫面切換 ────────────────────────────────
const screens = ['join','lobby','question','reveal','final'];
function showScreen(name) {
  screens.forEach(s =>
    document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name)
  );
}

// ─── 倒數計時 ────────────────────────────────
function startTimer(seconds) {
  if (currentTimer) clearInterval(currentTimer);
  let remaining = seconds;
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');

  function tick() {
    const pct = (remaining / seconds) * 100;
    bar.style.width = pct + '%';
    num.textContent = remaining;
    const urgent = remaining <= 10;
    bar.classList.toggle('urgent', urgent);
    num.classList.toggle('urgent', urgent);

    if (remaining <= 0) {
      clearInterval(currentTimer);
      // 時間到，自動以未答送出（計為答錯）
      if (!myAnswered) {
        myAnswered = true;
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        socket.emit('player:answer', { answer: null });
      }
      return;
    }
    remaining--;
  }
  tick();
  currentTimer = setInterval(tick, 1000);
}

// ─── 送出答案 ────────────────────────────────
function submitAnswer(key) {
  if (myAnswered) return;
  myAnswered = true;
  if (currentTimer) clearInterval(currentTimer);

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.key === key) btn.classList.add('selected');
  });

  socket.emit('player:answer', { answer: key });
}

// ─── 下一題按鈕 ──────────────────────────────
function goNext() {
  socket.emit('player:next');
}

// ─── 排行榜渲染 ──────────────────────────────
function renderLeaderboard(elId, data) {
  const el = document.getElementById(elId);
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = data.map((p, i) => `
    <li>
      <span class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i]||(i+1)}</span>
      <span class="rank-name">${esc(p.name)}</span>
      <span class="rank-score">${p.score.toLocaleString()}</span>
    </li>
  `).join('') || '<li style="color:var(--muted);font-size:0.9rem;padding:8px 0;">尚無玩家</li>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Socket 事件 ─────────────────────────────

// 加入成功
socket.on('player:joined', ({ name }) => {
  myName = name;
  document.getElementById('lobby-name-display').textContent = `✅ 歡迎，${name}！`;
  showScreen('lobby');
});

// 錯誤
socket.on('error', ({ msg }) => {
  const el = document.getElementById('join-error');
  el.textContent = msg;
  el.classList.remove('hidden');
});

// 大廳人員更新
socket.on('lobby:update', (data) => {
  renderLeaderboard('lobby-list', data);
  document.getElementById('lobby-count').textContent = data.length;
});

// 收到新題目（初次 or 下一題）
socket.on('question:new', (q) => {
  myAnswered = false;

  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-meta').textContent     = `第 ${q.index + 1} 題 / 共 ${q.total} 題`;
  document.getElementById('q-text').textContent     = q.text;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.textContent = q.options[i] || '';
    btn.disabled    = false;
    btn.classList.remove('selected','correct','wrong');
  });

  startTimer(q.timeLimit);
  showScreen('question');
});

// 答案揭曉（立即收到，不用等主持人）
socket.on('question:reveal', ({ correct, explanation, isCorrect, timedOut, points, totalScore, isLastQ }) => {
  if (currentTimer) clearInterval(currentTimer);

  const banner = document.getElementById('reveal-banner');
  const icon   = document.getElementById('reveal-icon');
  const title  = document.getElementById('reveal-title');
  const pts    = document.getElementById('reveal-points');

  if (timedOut) {
    banner.className      = 'result-banner wrong-bg';
    icon.textContent      = '⏰';
    title.textContent     = '時間到了！';
    pts.textContent       = '本題 0 分';
    pts.className         = 'result-points text-danger';
  } else if (isCorrect) {
    banner.className      = 'result-banner correct-bg';
    icon.textContent      = '🎉';
    title.textContent     = '答對了！';
    pts.textContent       = '+1,000 分';
    pts.className         = 'result-points text-success';
  } else {
    banner.className      = 'result-banner wrong-bg';
    icon.textContent      = '😓';
    title.textContent     = '答錯了…';
    pts.textContent       = '本題 0 分';
    pts.className         = 'result-points text-danger';
  }

  document.getElementById('reveal-total').textContent =
    `目前累積：${totalScore.toLocaleString()} 分`;

  const letter = Array.isArray(correct) ? correct.join('、') : correct;
  document.getElementById('reveal-correct-letter').textContent = letter;
  document.getElementById('reveal-explanation').textContent    = explanation;

  const nextBtn = document.getElementById('reveal-next-btn');
  nextBtn.textContent = isLastQ ? '🏁 查看最終排名' : '▶ 下一題';

  showScreen('reveal');
});

// 即時排行更新（給已在最終畫面等待的員工）
socket.on('leaderboard:live', (lb) => {
  if (!document.getElementById('screen-final').classList.contains('hidden')) {
    renderLeaderboard('final-leaderboard', lb);
  }
});

// 遊戲結束（所有人完成）
socket.on('game:ended', (lb) => {
  renderLeaderboard('final-leaderboard', lb);
  const statusEl = document.getElementById('final-status');
  if (statusEl) {
    statusEl.textContent = '🏆 所有人已完成！';
    statusEl.className = 'badge badge-green';
  }
  showScreen('final');
});

// 遊戲重置
socket.on('game:reset', () => {
  document.getElementById('name-input').value = '';
  myName = '';
  showScreen('join');
});

// ─── 加入遊戲 ─────────────────────────────────
document.getElementById('join-btn').addEventListener('click', () => {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    const el = document.getElementById('join-error');
    el.textContent = '請輸入姓名';
    el.classList.remove('hidden');
    return;
  }
  document.getElementById('join-error').classList.add('hidden');
  socket.emit('player:join', { name });
});

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('join-btn').click();
});
</script>
</body>
</html>
